<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="description" content="Silent Words - Buddhist & Taoist Quotes">
  
  <title>Silent Words</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading" class="screen loading-screen">
      <div class="loading-content">
        <div class="spinner"></div>
        <p data-i18n="loading">Loading databases...</p>
      </div>
    </div>

    <!-- Main App Screen -->
    <div id="main" class="screen main-screen hidden">
      <header class="app-header">
        <div class="header-brand">
          <span class="brand-icon">🔔</span>
          <h1 class="brand-title">Silent Words</h1>
        </div>
        
        <div class="header-controls">
          <!-- LANGUAGE TOGGLE ADDED HERE -->
          <button id="lang-toggle" class="control-btn lang-toggle" aria-label="Toggle language">
            <span class="lang-code">EN</span>
          </button>
          
          <button id="theme-toggle" class="control-btn theme-toggle" aria-label="Toggle theme">
            <span class="theme-icon sun">☀️</span>
            <span class="theme-icon moon">🌙</span>
          </button>
        </div>
      </header>

      <main class="quote-container">
        <div class="quote-card">
          <div class="quote-text-wrapper">
            <p id="quote-text" class="quote-text">Loading...</p>
          </div>
          <div class="quote-meta">
            <span id="quote-source" class="quote-source"></span>
            <span id="quote-chapter" class="quote-chapter"></span>
          </div>
        </div>

        <nav class="quote-nav">
          <button id="prev-btn" class="nav-btn" aria-label="Previous quote">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          
          <button id="random-btn" class="nav-btn nav-btn-primary" aria-label="Random quote">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 8h.01M8 8h.01M8 16h.01M16 16h.01M12 12h.01"></path>
            </svg>
          </button>
          
          <button id="next-btn" class="nav-btn" aria-label="Next quote">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </nav>

        <div class="action-bar">
          <button id="copy-btn" class="action-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span data-i18n="copy">Copy</span>
          </button>
          
          <button id="share-btn" class="action-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            <span data-i18n="share">Share</span>
          </button>
        </div>
      </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
      <span id="toast-message"></span>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
